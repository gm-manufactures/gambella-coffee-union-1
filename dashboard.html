<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Gambella Coffee Union</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:#f0f2f5}
        .navbar{background:#2d6a1a;color:white;padding:15px 30px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
        .container{max-width:1400px;margin:20px auto;padding:0 20px}
        .tabs{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
        .tab-btn{padding:12px 24px;background:white;border:none;border-radius:8px;cursor:pointer;font-weight:bold}
        .tab-btn.active{background:#2d6a1a;color:white}
        .tab-content{display:none;background:white;padding:30px;border-radius:12px}
        .tab-content.active{display:block}
        .form-section{margin-bottom:30px;padding:20px;background:#f9f9f9;border-radius:8px}
        .form-section h3{margin-bottom:15px;color:#2d6a1a}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:20px}
        .form-group{margin-bottom:15px}
        .form-group label{display:block;margin-bottom:5px;font-weight:bold}
        .form-group input,.form-group select,.form-group textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px}
        .btn-primary{background:#2d6a1a;color:white;padding:10px 20px;border:none;border-radius:6px;cursor:pointer}
        .btn-danger{background:#dc3545;color:white;padding:5px 10px;border:none;border-radius:4px;cursor:pointer}
        .member-card{border:1px solid #ddd;padding:15px;margin-bottom:15px;border-radius:8px;background:#fafafa}
        .member-card strong{color:#2d6a1a}
        .search-bar{margin-bottom:20px}
        .search-bar input{width:100%;padding:12px;border:1px solid #ddd;border-radius:6px}
        .logout-btn{background:#dc3545;color:white;border:none;padding:8px 16px;border-radius:6px;cursor:pointer}
        @media(max-width:768px){.form-row{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <nav class="navbar">
        <div><strong>🌿 Gambella Coffee Union</strong> | Manufacturer and Exporter PLC</div>
        <div>
            <span id="userName"></span>
            <button onclick="logout()" class="logout-btn" style="margin-left:15px">🚪 Logout</button>
        </div>
    </nav>
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('register')">📝 Register Member</button>
            <button class="tab-btn" onclick="showTab('list')">📋 Members List</button>
            <button class="tab-btn" onclick="showTab('sales')">💰 Record Sale</button>
            <button class="tab-btn" onclick="showTab('search')">🔍 Search</button>
        </div>
        
        <div id="register" class="tab-content active">
            <h2>📝 Register New Member</h2>
            <form id="memberForm">
                <div class="form-section">
                    <h3>Personal Information</h3>
                    <div class="form-row">
                        <div class="form-group"><label>Full Name *</label><input type="text" id="fullName" required></div>
                        <div class="form-group"><label>Gender *</label><select id="gender"><option>Male</option><option>Female</option></select></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Age *</label><input type="number" id="age" required></div>
                        <div class="form-group"><label>Mother's Name *</label><input type="text" id="motherName" required></div>
                    </div>
                    <div class="form-group"><label>Address *</label><textarea id="address" rows="2" required></textarea></div>
                    <div class="form-row">
                        <div class="form-group"><label>Phone *</label><input type="tel" id="phone" required></div>
                        <div class="form-group"><label>Role/Position *</label><input type="text" id="role" required></div>
                    </div>
                    <div class="form-group"><label>📸 Member Photo</label><input type="file" id="memberPhoto" accept="image/*"></div>
                </div>
                <button type="submit" class="btn-primary">✅ Register Member</button>
            </form>
        </div>
        
        <div id="list" class="tab-content">
            <h2>📋 Members List</h2>
            <div class="search-bar"><input type="text" id="searchInput" placeholder="Search by name or phone..." onkeyup="loadMembers()"></div>
            <div id="membersList"></div>
        </div>
        
        <div id="sales" class="tab-content">
            <h2>💰 Record Coffee Sale</h2>
            <div class="form-section">
                <div class="form-group"><label>Select Member</label><select id="saleMemberId"></select></div>
                <div class="form-row">
                    <div class="form-group"><label>Date</label><input type="date" id="saleDate"></div>
                    <div class="form-group"><label>Product Type</label><select id="productType"><option>Forest Coffee</option><option>Garden Coffee</option></select></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Quantity (kg)</label><input type="number" id="quantity" step="0.01"></div>
                    <div class="form-group"><label>Price per kg (ETB)</label><input type="number" id="pricePerKg" step="0.01"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Total Amount</label><input type="text" id="totalAmount" readonly style="background:#e9ecef"></div>
                    <div class="form-group"><label>Payment Method</label><select id="paymentMethod"><option>Cash</option><option>Bank Transfer</option></select></div>
                </div>
                <button onclick="recordSale()" class="btn-primary">💾 Record Sale</button>
            </div>
            <div id="salesHistory"></div>
        </div>
        
        <div id="search" class="tab-content">
            <h2>🔍 Search Member</h2>
            <div class="form-group"><input type="text" id="searchTerm" placeholder="Enter name or phone..." onkeyup="searchMembers()" style="width:100%;padding:12px"></div>
            <div id="searchResults"></div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/';
        
        function apiCall(endpoint, options = {}) {
            return fetch(`/api${endpoint}`, {
                ...options,
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...options.headers }
            }).then(res => res.json());
        }
        
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
            });
        }
        
        async function loadMembers() {
            let members = await apiCall('/members');
            const search = document.getElementById('searchInput')?.value || '';
            if (search) {
                members = members.filter(m => m.fullName.toLowerCase().includes(search.toLowerCase()) || m.phone.includes(search));
            }
            const container = document.getElementById('membersList');
            if (!members.length) { container.innerHTML = '<p>No members found</p>'; return; }
            container.innerHTML = members.map(m => `
                <div class="member-card">
                    <strong>👤 ${m.fullName}</strong><br>
                    📞 ${m.phone}<br>
                    👔 ${m.role}<br>
                    📍 ${m.address}<br>
                    <button onclick="deleteMember('${m.id}')" class="btn-danger" style="margin-top:10px">🗑️ Delete</button>
                </div>
            `).join('');
            
            const saleSelect = document.getElementById('saleMemberId');
            if (saleSelect) {
                saleSelect.innerHTML = members.map(m => `<option value="${m.id}">${m.fullName} - ${m.phone}</option>`).join('');
            }
        }
        
        async function deleteMember(id) {
            if (confirm('Delete this member?')) {
                await apiCall(`/members/${id}`, { method: 'DELETE' });
                loadMembers();
            }
        }
        
        document.getElementById('memberForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const photoFile = document.getElementById('memberPhoto').files[0];
            const member = {
                fullName: document.getElementById('fullName').value,
                gender: document.getElementById('gender').value,
                age: parseInt(document.getElementById('age').value),
                motherName: document.getElementById('motherName').value,
                address: document.getElementById('address').value,
                phone: document.getElementById('phone').value,
                role: document.getElementById('role').value,
                nationality: 'Ethiopian',
                memberPhoto: photoFile ? await fileToBase64(photoFile) : null
            };
            await apiCall('/members', { method: 'POST', body: JSON.stringify(member) });
            alert('✅ Member registered!');
            e.target.reset();
            loadMembers();
            showTab('list');
        });
        
        async function recordSale() {
            const qty = parseFloat(document.getElementById('quantity').value);
            const price = parseFloat(document.getElementById('pricePerKg').value);
            const sale = {
                memberId: document.getElementById('saleMemberId').value,
                date: document.getElementById('saleDate').value,
                productType: document.getElementById('productType').value,
                quantity: qty,
                pricePerKg: price,
                totalAmount: qty * price,
                paymentMethod: document.getElementById('paymentMethod').value
            };
            if (!sale.memberId || !sale.quantity || !sale.pricePerKg) {
                alert('Please fill all fields');
                return;
            }
            await apiCall('/sales', { method: 'POST', body: JSON.stringify(sale) });
            alert('✅ Sale recorded!');
            document.getElementById('quantity').value = '';
            document.getElementById('pricePerKg').value = '';
            document.getElementById('totalAmount').value = '';
            loadSalesHistory();
        }
        
        async function loadSalesHistory() {
            const sales = await apiCall('/sales');
            if (!sales.length) { document.getElementById('salesHistory').innerHTML = '<p>No sales yet</p>'; return; }
            document.getElementById('salesHistory').innerHTML = `<h3>Recent Sales</h3>${sales.slice(0, 20).map(s => `
                <div class="member-card">📅 ${new Date(s.date).toLocaleDateString()} | ${s.quantity} kg | ${s.totalAmount} ETB</div>
            `).join('')}`;
        }
        
        async function searchMembers() {
            const term = document.getElementById('searchTerm').value;
            if (!term) { document.getElementById('searchResults').innerHTML = ''; return; }
            const members = await apiCall(`/members/search/${term}`);
            document.getElementById('searchResults').innerHTML = members.map(m => `
                <div class="member-card"><strong>${m.fullName}</strong><br>📞 ${m.phone}<br>📍 ${m.address}</div>
            `).join('');
        }
        
        function calculateTotal() {
            const qty = parseFloat(document.getElementById('quantity').value) || 0;
            const price = parseFloat(document.getElementById('pricePerKg').value) || 0;
            document.getElementById('totalAmount').value = (qty * price).toFixed(2) + ' ETB';
        }
        
        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
            if (tab === 'list') loadMembers();
            if (tab === 'sales') loadSalesHistory();
        }
        
        function logout() { localStorage.clear(); window.location.href = '/'; }
        
        document.getElementById('quantity')?.addEventListener('input', calculateTotal);
        document.getElementById('pricePerKg')?.addEventListener('input', calculateTotal);
        document.getElementById('saleDate').valueAsDate = new Date();
        
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        document.getElementById('userName').innerHTML = `👤 ${user.fullName || 'User'}`;
        
        loadMembers();
        loadSalesHistory();
    </script>
</body>
</html>
